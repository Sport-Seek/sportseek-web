name: branch-governance

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce-pr-flow:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR flow
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          HEAD_REF='${{ github.event.pull_request.head.ref }}'
          BASE_REF='${{ github.event.pull_request.base.ref }}'

          VALID='true'
          REASON=''

          if [[ "$BASE_REF" == "dev" ]]; then
            if [[ ! "$HEAD_REF" =~ ^feature/.+ ]]; then
              VALID='false'
              REASON='PRs targeting dev must come from feature/* branches.'
            fi
          elif [[ "$BASE_REF" == "main" ]]; then
            if [[ "$HEAD_REF" != "dev" ]]; then
              VALID='false'
              REASON='PRs targeting main must come from dev.'
            fi
          else
            VALID='false'
            REASON='Only dev and main are authorized PR target branches.'
          fi

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "valid=$VALID" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Comment and close invalid PR
        if: steps.validate.outputs.valid != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const head = `${{ steps.validate.outputs.head_ref }}`;
            const base = `${{ steps.validate.outputs.base_ref }}`;
            const reason = `${{ steps.validate.outputs.reason }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                'Branch governance check failed.',
                '',
                `- head: \`${head}\``,
                `- base: \`${base}\``,
                `- reason: ${reason}`,
                '',
                'Allowed flows:',
                '- `feature/* -> dev`',
                '- `dev -> main`'
              ].join('\n')
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });

      - name: Fail when invalid
        if: steps.validate.outputs.valid != 'true'
        shell: bash
        run: |
          echo "Invalid PR flow: ${{ steps.validate.outputs.reason }}"
          exit 1
